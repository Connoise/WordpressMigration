<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agoe the Idol//connoise</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', Arial, sans-serif;
      background: #000;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .portfolio-container {
      background: #333;
      color: white;
      padding: 60px 40px;
      text-align: center;
      border-radius: 16px;
      max-width: 600px;
      width: 90%;
      box-shadow: 0 8px 30px rgba(0,0,0,0.5);
      position: relative;
      overflow: hidden;
    }

    .portfolio-container::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,0.3) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(128,128,128,0.4) 0%, transparent 35%),
        radial-gradient(circle at 50% 20%, rgba(64,64,64,0.5) 0%, transparent 50%),
        radial-gradient(circle at 10% 80%, rgba(192,192,192,0.3) 0%, transparent 30%),
        radial-gradient(circle at 90% 10%, rgba(96,96,96,0.4) 0%, transparent 45%),
        radial-gradient(circle at 70% 90%, rgba(160,160,160,0.3) 0%, transparent 40%),
        radial-gradient(circle at 30% 60%, rgba(48,48,48,0.6) 0%, transparent 35%),
        radial-gradient(circle at 60% 40%, rgba(224,224,224,0.2) 0%, transparent 55%);
      animation:
        spiral1 15s linear infinite,
        bubble1 8s ease-in-out infinite,
        noise1 12s linear infinite;
      z-index: 1;
    }

    .portfolio-container::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        radial-gradient(circle at 40% 90%, rgba(0,0,0,0.4) 0%, transparent 30%),
        radial-gradient(circle at 85% 25%, rgba(255,255,255,0.2) 0%, transparent 60%),
        radial-gradient(circle at 15% 45%, rgba(112,112,112,0.5) 0%, transparent 40%),
        radial-gradient(circle at 75% 65%, rgba(32,32,32,0.6) 0%, transparent 35%),
        radial-gradient(circle at 25% 15%, rgba(176,176,176,0.3) 0%, transparent 50%),
        radial-gradient(circle at 95% 85%, rgba(80,80,80,0.4) 0%, transparent 25%);
      animation:
        spiral2 18s linear infinite reverse,
        bubble2 10s ease-in-out infinite,
        noise2 14s linear infinite reverse;
      z-index: 2;
    }

    .portfolio-container > * {
      position: relative;
      z-index: 3;
    }

    .nav-link {
      display: block;
      font-size: 3rem;
      font-weight: 100;
      color: #ffffff;
      text-decoration: none;
      margin: 30px 0;
      transition: all 0.3s ease;
      letter-spacing: 0.05em;
    }

    .nav-link:hover {
      transform: scale(1.05);
      text-shadow: 0 0 20px rgba(255,255,255,0.5);
    }

    .nav-link.music    { animation: breathe-music    3s   ease-in-out infinite; }
    .nav-link.gis      { animation: breathe-gis      3.5s ease-in-out infinite; }
    .nav-link.art      { animation: breathe-art      2.5s ease-in-out infinite; }
    .nav-link.mushrooms{ animation: breathe-mushrooms 4s  ease-in-out infinite; }
    .nav-link.about    { animation: breathe-about    3.2s ease-in-out infinite; }

    @keyframes spiral1 {
      0%   { transform: rotate(0deg)   scale(1);    }
      25%  { transform: rotate(90deg)  scale(1.1);  }
      50%  { transform: rotate(180deg) scale(0.9);  }
      75%  { transform: rotate(270deg) scale(1.05); }
      100% { transform: rotate(360deg) scale(1);    }
    }
    @keyframes spiral2 {
      0%   { transform: rotate(0deg)   scale(0.8); }
      33%  { transform: rotate(120deg) scale(1.2); }
      66%  { transform: rotate(240deg) scale(0.7); }
      100% { transform: rotate(360deg) scale(0.8); }
    }
    @keyframes bubble1 {
      0%, 100% { background-size: 200% 200%, 150% 150%, 180% 180%, 120% 120%, 160% 160%, 140% 140%, 110% 110%, 190% 190%; }
      50%       { background-size: 250% 250%, 200% 200%, 230% 230%, 170% 170%, 210% 210%, 190% 190%, 160% 160%, 240% 240%; }
    }
    @keyframes bubble2 {
      0%, 100% { background-size: 180% 180%, 220% 220%, 160% 160%, 140% 140%, 200% 200%, 130% 130%; }
      50%       { background-size: 230% 230%, 270% 270%, 210% 210%, 190% 190%, 250% 250%, 180% 180%; }
    }
    @keyframes noise1 {
      0%   { background-position: 0% 0%,   100% 100%, 50% 0%,   0% 100%,  100% 0%,  50% 100%, 25% 25%, 75% 75%; }
      25%  { background-position: 25% 25%,  75% 75%,  100% 25%, 25% 75%,  75% 25%,  0% 75%,   50% 50%, 100% 0%; }
      50%  { background-position: 50% 50%,  50% 50%,  0% 50%,   50% 50%,  50% 50%,  25% 50%,  75% 75%, 25% 25%; }
      75%  { background-position: 75% 75%,  25% 25%,  25% 75%,  75% 25%,  25% 75%,  50% 25%,  0% 0%,   50% 50%; }
      100% { background-position: 100% 100%, 0% 0%,   50% 100%, 100% 0%,  0% 100%,  75% 0%,   25% 25%, 75% 75%; }
    }
    @keyframes noise2 {
      0%   { background-position: 50% 50%, 0% 100%,  100% 0%,  25% 75%,  75% 25%,  50% 0%;   }
      33%  { background-position: 75% 25%, 33% 66%,  66% 33%,  50% 50%,  100% 75%, 25% 100%; }
      66%  { background-position: 25% 75%, 66% 33%,  33% 66%,  75% 25%,  50% 100%, 0% 50%;   }
      100% { background-position: 0% 0%,   100% 0%,  0% 100%,  100% 100%, 25% 25%, 75% 75%;  }
    }
    @keyframes breathe-music    { 0%,100%{color:#fff} 50%{color:#ff6b9d} }
    @keyframes breathe-gis      { 0%,100%{color:#fff} 50%{color:#4ecdc4} }
    @keyframes breathe-art      { 0%,100%{color:#fff} 50%{color:#ffd93d} }
    @keyframes breathe-mushrooms{ 0%,100%{color:#fff} 50%{color:#8b5a3c} }
    @keyframes breathe-about    { 0%,100%{color:#fff} 50%{color:#9c88ff} }
  </style>
</head>
<body>
  <div class="portfolio-container">
    <a href="pages/music.html"  class="nav-link music">Music</a>
    <a href="pages/gis.html"    class="nav-link gis">GIS</a>
    <a href="pages/art.html"    class="nav-link art">Digital Art</a>
    <a href="pages/about.html"  class="nav-link about">Contact + About Me</a>
  </div>
</body>
</html>

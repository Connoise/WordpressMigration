                <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stylish Links with Ruby Annotations</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #181818;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #fff;
            text-align: center;
        }

        .link {
            display: block;
            margin: 20px 0;
            text-decoration: none;
            color: #ff0000;
            font-size: 24px;
            animation: fade 6s linear infinite;
            transform: rotate(90deg);
        }

        .link ruby {
            font-style: italic;
        }

        .link:nth-child(1) {
            animation-delay: 0s;
        }

        .link:nth-child(2) {
            animation-delay: 2s;
        }

        .link:nth-child(3) {
            animation-delay: 4s;
        }

        @keyframes fade {
            0%, 100% {
                opacity: 0;
            }
            50% {
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="http://connoi.se/music" class="link" data-type="URL" data-id="connoi.se/music">
            <ruby>Music<rp>(</rp><rt>Downloads</rt><rp>)</rp></ruby>
        </a>
        <br>
        <a href="https://connoi.se/about" class="link"><ruby>About<rp>(</rp><rt>Links</rt><rp>)</rp></ruby></a>
        <br>
        <a href="https://connoi.se/music/streams" class="link" data-type="URL" data-id="https://connoi.se/music/streams/">
            <ruby>Streams<rp>(</rp><rt>Live</rt><rp>)</rp></ruby>
        </a>
    </div>
</body>
<style>
  a:hover, a:hover ruby, a:hover rt {
    color: white;
  }
</style>
</html>
